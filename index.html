<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <h1>Snake</h1>

    <div class="stats">
      <div class="stat">
        <span class="label">Score</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">High Score</span>
        <span id="highScore" class="value">0</span>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="board" width="400" height="400"></canvas>
      <div id="overlay" class="overlay">
        <p id="overlayText">Press Space or tap Start to play</p>
        <button id="startBtn">Start</button>
      </div>
    </div>

    <div class="game-controls">
      <button id="pauseBtn" disabled>Pause</button>
      <button id="resumeBtn" disabled>Resume</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>

    <div class="controls">
      <p>Arrow keys / WASD to move. Space to pause. Walls wrap around! Eat 10 for a bonus.</p>
      <button id="resetStatsBtn" class="reset-btn">Reset High Score</button>
    </div>
  </div>

  <div class="side-controls side-left">
    <button data-dir="left" aria-label="Left">&#8592;</button>
    <button data-dir="down" aria-label="Down">&#8595;</button>
  </div>
  <div class="side-controls side-right">
    <button data-dir="up" aria-label="Up">&#8593;</button>
    <button data-dir="right" aria-label="Right">&#8594;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
